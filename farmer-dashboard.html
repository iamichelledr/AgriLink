<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLink – Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/db.js"></script>
<div class="toast" id="toast"></div>

<!-- Modals -->
<div class="overlay" id="overlay-bid"><div class="modal" id="modal-bid"></div></div>
<div class="overlay" id="overlay-gcash"><div class="modal" id="modal-gcash"></div></div>
<div class="overlay" id="overlay-track"><div class="modal" id="modal-track"></div></div>

<script>
const u=requireAuth('farmer');
if(u){
  renderTopbar();
  document.body.insertAdjacentHTML('beforeend',`
  <div class="dash-layout">
    ${renderSidebar('dashboard')}
    <div class="dash-content">
      <div class="page-title">Overview</div>
      <div class="page-sub">Good day, ${u.name.split(' ')[0]}! Here's your harvest summary.</div>
      ${renderStats()}
      ${renderRecentBids()}
      ${renderActiveListings()}
    </div>
  </div>`);
}

function renderStats(){
  const myProds=DB.products().filter(p=>p.farmer_id===u.id);
  const myBids=DB.bids().filter(b=>myProds.some(p=>p.id===b.product_id));
  const myOrders=DB.orders().filter(o=>o.farmer_id===u.id);
  const earned=myOrders.filter(o=>o.gcash_status==='paid'||o.gcash_status==='confirmed').reduce((s,o)=>s+o.amount,0);
  return `<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Active Listings</div><div class="stat-val">${myProds.filter(p=>p.status==='active').length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Bids Received</div><div class="stat-val">${myBids.length}</div></div>
    <div class="stat-card"><div class="stat-label">Orders</div><div class="stat-val">${myOrders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-val" style="font-size:1.1rem;color:var(--g700)">${fmtMoney(earned)}</div></div>
  </div>`;
}

function renderRecentBids(){
  const myProds=DB.products().filter(p=>p.farmer_id===u.id);
  const myBids=DB.bids().filter(b=>myProds.some(p=>p.id===b.product_id)).sort((a,b)=>b.created_at-a.created_at).slice(0,5);
  return `<div class="sec-header"><div class="sec-title">Recent Bids</div><a href="farmer-listings.html" class="btn btn-outline btn-sm">View Listings</a></div>
    ${myBids.length===0?`<div class="card"><div class="empty"><div class="empty-ico">📭</div><h3>No bids yet</h3><p>List a harvest to start receiving bids.</p></div></div>`:''}
    ${myBids.map(b=>{const prod=myProds.find(p=>p.id===b.product_id);
      return prod?`<div class="bid-item flex fac fjb"><div><div class="bid-buyer">${b.buyer_name}</div><div class="bid-time">on ${prod.name} · ${timeAgo(b.created_at)}</div></div><div class="bid-amount">${fmtMoney(b.amount)}</div></div>`:'';
    }).join('')}`;
}

function renderActiveListings(){
  const prods=DB.products().filter(p=>p.farmer_id===u.id&&p.status==='active');
  return `<div class="sec-header mt2"><div class="sec-title">Active Listings</div><a href="farmer-sell.html" class="btn btn-green btn-sm">+ New Listing</a></div>
    ${prods.length===0?`<div class="empty"><div class="empty-ico">🌱</div><h3>No active listings</h3><p>Start selling your harvest!</p></div>`:''}
    <div class="prod-grid">${prods.map(p=>{
      const tb=getTopBid(p.id);
      return `<div class="prod-card" onclick="openBids('${p.id}')">
        <div class="prod-thumb">${p.photo?`<img src="${p.photo}">`:`<span>${p.emoji||'📦'}</span>`}</div>
        <div class="prod-body">
          <div class="flex fac fjb mb1"><span class="badge badge-green">🟢 Active</span><span class="badge badge-amber">⚡ ${getBidCount(p.id)} bids</span></div>
          <div class="prod-name">${p.name}</div><div class="prod-loc">📍 ${p.location}</div>
          <div class="prod-footer"><div><div class="prod-price">${tb?fmtMoney(tb.amount):fmtMoney(p.starting_price)}</div><div class="prod-qty">${p.quantity} ${p.unit}${tb?' · top bid':' · starting'}</div></div>
          <button class="btn btn-green btn-sm">View Bids</button></div>
        </div></div>`;
    }).join('')}</div>`;
}

function openBids(pid){
  const prod=DB.products().find(p=>p.id===pid);
  const bids=DB.bids().filter(b=>b.product_id===pid).sort((a,b)=>b.amount-a.amount);
  document.getElementById('modal-bid').innerHTML=`
    <div class="modal-head"><h2>Bids on ${prod.name}</h2><button class="modal-close" onclick="closeModal('overlay-bid')">✕</button></div>
    <div class="modal-body">
      <div class="card card-sm mb1 flex fac gap1">
        <div class="thumb-sm">${prod.photo?`<img src="${prod.photo}">`:(prod.emoji||'📦')}</div>
        <div><div class="bold">${prod.name}</div><div class="text-muted">${prod.quantity} ${prod.unit} · ${prod.location}</div><div class="bold" style="color:var(--g700)">Starting: ${fmtMoney(prod.starting_price)}</div></div>
      </div>
      ${bids.length===0?`<div class="empty"><div class="empty-ico">📭</div><h3>No bids yet</h3></div>`:''}
      ${bids.map((b,i)=>`<div class="bid-item ${i===0?'top':''} flex fac fjb">
        <div><div class="bid-buyer">${i===0?'🥇 ':''}${b.buyer_name}</div><div class="bid-time">${timeAgo(b.created_at)}</div></div>
        <div class="flex fac gap1"><div class="bid-amount">${fmtMoney(b.amount)}</div>
        ${i===0&&prod.status==='active'?`<button class="btn btn-green btn-sm" onclick="acceptBid('${b.id}','${pid}')">Accept</button>`:''}
        </div></div>`).join('')}
    </div>`;
  openModal('overlay-bid');
}

function acceptBid(bidId,pid){
  const bid=DB.bids().find(b=>b.id===bidId);
  const prod=DB.products().find(p=>p.id===pid);
  if(!bid||!prod)return;
  const order={id:uid(),product_id:pid,bid_id:bidId,farmer_id:u.id,buyer_id:bid.buyer_id,buyer_name:bid.buyer_name,farmer_name:u.name,amount:bid.amount,gcash_status:'pending',track_status:'confirmed',created_at:Date.now(),gcash_ref:'GC'+uid().toUpperCase().slice(0,8)};
  DB.addOrder(order);DB.updateProduct(pid,{status:'sold'});
  closeModal('overlay-bid');
  toast('Bid accepted! Waiting for GCash payment. 🎉');
  setTimeout(()=>location.reload(),800);
}
</script>
</body>
</html>
