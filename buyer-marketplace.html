<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLink – Marketplace</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/db.js"></script>
<div class="toast" id="toast"></div>
<div class="overlay" id="overlay-bid"><div class="modal" id="modal-bid"></div></div>

<script>
const u=requireAuth('buyer');
let filter='all', search='';

if(u){
  renderTopbar();
  document.body.insertAdjacentHTML('beforeend',`
  <div class="dash-layout">
    ${renderSidebar('marketplace')}
    <div class="dash-content" id="market-content"></div>
  </div>`);
  renderPage();
}

function renderPage(){
  let prods=DB.products().filter(p=>p.status==='active');
  if(filter!=='all')prods=prods.filter(p=>p.category===filter);
  if(search)prods=prods.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.location.toLowerCase().includes(search.toLowerCase()));

  document.getElementById('market-content').innerHTML=`
    <div class="page-title">Marketplace</div>
    <div class="page-sub">Browse ${DB.products().filter(p=>p.status==='active').length} fresh harvests from Filipino farmers</div>
    <div class="search-wrap"><span class="search-ico">🔍</span><input class="form-input" id="search-input" placeholder="Search crops or location..." value="${search}" oninput="search=this.value;renderPage()" style="padding-left:2.5rem;"></div>
    <div class="filter-bar">
      ${[['all','All'],['rice','🌾 Rice'],['vegetable','🥬 Vegetables'],['fruit','🍑 Fruits']].map(([k,l])=>`<div class="ftab ${filter===k?'active':''}" onclick="filter='${k}';renderPage()">${l}</div>`).join('')}
    </div>
    ${prods.length===0?`<div class="empty"><div class="empty-ico">🌿</div><h3>No listings found</h3><p>Try a different search or filter.</p></div>`:''}
    <div class="prod-grid">${prods.map(p=>{
      const tb=getTopBid(p.id);
      const myBid=DB.bids().find(b=>b.product_id===p.id&&b.buyer_id===u.id);
      return`<div class="prod-card" onclick="openBidModal('${p.id}')">
        <div class="prod-thumb">${p.photo?`<img src="${p.photo}">`:`<span>${p.emoji||'📦'}</span>`}
          <span style="position:absolute;top:8px;right:8px;" class="badge badge-amber">⚡ ${getBidCount(p.id)} bids</span>
          ${myBid?`<span style="position:absolute;top:8px;left:8px;" class="badge badge-blue">Your bid</span>`:''}
        </div>
        <div class="prod-body">
          <div class="prod-name">${p.name}</div>
          <div class="prod-loc">📍 ${p.location} · by ${p.farmer_name}</div>
          <div class="prod-footer mt1">
            <div>
              <div class="prod-price">${tb?fmtMoney(tb.amount)+' top':fmtMoney(p.starting_price)+' start'}</div>
              <div class="prod-qty">${p.quantity} ${p.unit}</div>
            </div>
            <button class="btn ${myBid?'btn-outline':'btn-green'} btn-sm">${myBid?'🔄 Update':'⚡ Bid'}</button>
          </div>
        </div>
      </div>`;
    }).join('')}
    </div>`;
}

function openBidModal(pid){
  const prod=DB.products().find(p=>p.id===pid);if(!prod)return;
  const bids=DB.bids().filter(b=>b.product_id===pid).sort((a,b)=>b.amount-a.amount);
  const myBid=bids.find(b=>b.buyer_id===u.id);
  const topBid=bids[0];
  const minBid=(topBid?topBid.amount:prod.starting_price)+1;

  document.getElementById('modal-bid').innerHTML=`
    <div class="modal-head">
      <h2>${prod.name}</h2>
      <button class="modal-close" onclick="closeModal('overlay-bid')">✕</button>
    </div>
    <div class="modal-body">
      <div class="card card-sm mb1 flex fac gap1" style="background:var(--g50);">
        <div class="thumb-sm">${prod.photo?`<img src="${prod.photo}">`:(prod.emoji||'📦')}</div>
        <div>
          <div class="bold">${prod.name}</div>
          <div class="text-muted">${prod.quantity} ${prod.unit} · 📍 ${prod.location}</div>
          <div class="text-muted">by ${prod.farmer_name}</div>
        </div>
      </div>
      <div class="flex fac fjb mb1">
        <span class="text-muted">Starting price</span><span class="bold">${fmtMoney(prod.starting_price)}</span>
      </div>
      ${bids.length>0?`
        <div class="form-label" style="margin-bottom:.5rem;">Current Bids</div>
        ${bids.slice(0,5).map((b,i)=>`<div class="bid-item ${i===0?'top':''} flex fac fjb">
          <div><div class="bid-buyer">${i===0?'🥇 ':''}${b.buyer_id===u.id?'<span style="color:var(--g700)">You</span>':b.buyer_name}</div><div class="bid-time">${timeAgo(b.created_at)}</div></div>
          <div class="bid-amount">${fmtMoney(b.amount)}</div>
        </div>`).join('')}`:''}
      ${myBid?`<div class="badge badge-blue mt1 mb1">Your current bid: ${fmtMoney(myBid.amount)}</div>`:''}
      <div class="form-group mt1">
        <label class="form-label">Your Bid (₱) — minimum ${fmtMoney(minBid)}</label>
        <input id="bid-val" class="form-input" type="number" min="${minBid}" placeholder="${minBid}" style="font-size:1.1rem;">
      </div>
      <p id="bid-msg" style="font-size:.8rem;color:var(--g700);min-height:1.2em;"></p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('overlay-bid')">Cancel</button>
      <button class="btn btn-green" onclick="submitBid('${pid}',${minBid})">⚡ Place Bid</button>
    </div>`;
  openModal('overlay-bid');
}

function submitBid(pid,minBid){
  const val=Number(document.getElementById('bid-val').value);
  const msg=document.getElementById('bid-msg');
  if(!val||val<minBid){msg.textContent='Bid must be at least ₱'+minBid.toLocaleString();msg.style.color='#c0392b';return;}
  const existing=DB.bids().find(b=>b.product_id===pid&&b.buyer_id===u.id);
  if(existing){
    const all=DB.bids();const i=all.findIndex(b=>b.id===existing.id);
    all[i].amount=val;all[i].created_at=Date.now();DB.set('bids',all);
    toast('Bid updated to '+fmtMoney(val)+'!');
  } else {
    DB.addBid({id:uid(),product_id:pid,buyer_id:u.id,buyer_name:u.name,amount:val,created_at:Date.now()});
    toast('Bid of '+fmtMoney(val)+' placed! 🎉');
  }
  closeModal('overlay-bid');
  renderPage();
}
</script>
</body>
</html>
